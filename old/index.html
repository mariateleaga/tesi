<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Blooming Inequalities</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button id="menuToggle" aria-label="Apri legenda e selezione paesi">☰</button>

  <div id="controls">
    <button id="playBtn">Play</button>
    <input type="range" id="yearSlider" min="2000" max="2022" step="1" value="2000">
    <span id="yearLabel">2000</span>
  </div>

  <div id="side-panel">
    <svg id="legend" width="260" height="440"></svg>

    <hr>

    <div class="panel-section-title">Seleziona paesi</div>
    <input type="text" id="countrySearch" placeholder="Cerca paese...">
    <div id="countryCheckboxes"></div>
    <div class="panel-buttons">
      <button id="confirmSelection">Conferma selezione</button>
      <button id="resetSelection">Mostra tutti</button>
    </div>
  </div>

  <div id="chart-scroll">
    <svg id="chart" width="5200" height="920"></svg>
  </div>

  <div id="tooltip"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
